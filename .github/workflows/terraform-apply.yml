name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev]
  push:
    branches: [main]
    paths:
      - "terraform/**"

concurrency:
  group: terraform-apply-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false   # never cancel an in-flight apply

jobs:
  terraform:
    name: Terraform Apply — ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    permissions:
      contents: read
      id-token: write   # reserved for OIDC if AWS credentials are migrated later

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false   # required: wrapper breaks `terraform output -raw`

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/environments/dev
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve tfplan

      # ── Bootstrap: write infra values so ArgoCD can deploy Ingress ──────────
      # After every apply (create or recreate), ACM and ALB SG IDs change.
      # This step captures the live outputs and commits them to the deployments
      # repo as charts/ingress/values-infra.yaml. ArgoCD detects the Git change
      # and syncs the Ingress with the current cert ARN and SG ID.
      - name: Generate values-infra.yaml from Terraform outputs
        working-directory: terraform/environments/dev
        run: |
          CERT_ARN=$(terraform output -raw acm_certificate_arn)
          ALB_SG_ID=$(terraform output -raw alb_sg_id)
          HOSTED_ZONE_ID=$(terraform output -raw hosted_zone_id)

          cat > /tmp/values-infra.yaml <<EOF
          # Auto-generated by GitHub Actions after terraform apply.
          # DO NOT EDIT MANUALLY — overwritten on every apply.
          # Allowed: infrastructure identifiers (ARNs, IDs) only.
          # Forbidden: passwords, JWT secrets, API keys — those stay in Secrets Manager.
          certArn: "${CERT_ARN}"
          albSgId: "${ALB_SG_ID}"
          hostedZoneId: "${HOSTED_ZONE_ID}"
          EOF

      - name: Generate GitHub App token for deployments repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: fleetops-deployments

      - name: Checkout deployments repo
        uses: actions/checkout@v4
        with:
          repository: FleetOps-V2/fleetops-deployments
          path: fleetops-deployments
          token: ${{ steps.app-token.outputs.token }}

      - name: Commit and push values-infra.yaml
        run: |
          cp /tmp/values-infra.yaml fleetops-deployments/environments/dev/infra-values.yaml
          cd fleetops-deployments
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/dev/infra-values.yaml
          # only commit if file actually changed (idempotent on unchanged infra)
          git diff --cached --quiet || git commit -m "chore: update ingress infra values from terraform [skip ci]"
          git push

# FleetOps nginx API Gateway
# Routes all frontend /api/* calls to the correct backend service.
# This removes the need for the frontend to know individual service ports.
#
# Routing table:
#   /api/auth/**         → auth-service:8080
#   /api/vehicles/**     → vehicle-service:8080
#   /api/tracking/**     → vehicle-service:8080  (TrackingController — GPS telemetry)
#   /api/requests/**     → request-service:8080
#   /api/tasks/**        → maintenance-service:8080
#   /                    → frontend static files
#
# Phase 5: /api/tracking/** will be routed to a new tracking-service backed by DynamoDB.

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"         always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection "1; mode=block"     always;
    add_header Referrer-Policy "strict-origin"       always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    # ── Auth Service ───────────────────────────────────────────────────────────
    location /api/auth {
        proxy_pass         http://auth-service:8080/auth;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Vehicle Service ────────────────────────────────────────────────────────
    location /api/vehicles {
        proxy_pass         http://vehicle-service:8080/api/vehicles;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Tracking Service (GPS Telemetry) ───────────────────────────────────────
    # Hosted inside vehicle-service for now.
    # Phase 5: this block will point to a dedicated tracking-service.
    location /api/tracking {
        proxy_pass         http://vehicle-service:8080/api/tracking;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # ── Request Service ────────────────────────────────────────────────────────
    location /api/requests {
        proxy_pass         http://request-service:8080/api/requests;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Maintenance Service ────────────────────────────────────────────────────
    location /api/tasks {
        proxy_pass         http://maintenance-service:8080/api/tasks;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Actuator health (all services aggregated) ──────────────────────────────
    location /health/auth        { proxy_pass http://auth-service:8080/actuator/health; }
    location /health/vehicles    { proxy_pass http://vehicle-service:8080/actuator/health; }
    location /health/requests    { proxy_pass http://request-service:8080/actuator/health; }
    location /health/maintenance { proxy_pass http://maintenance-service:8080/actuator/health; }

    # ── Frontend SPA (React) ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
